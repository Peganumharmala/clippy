name: Build & Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }} - ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macOS-latest
            arch: arm64
          - os: macOS-latest
            arch: x64
          - os: windows-latest
            arch: x64
          - os: ubuntu-latest
            arch: x64

    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: Get npm cache directory
        id: npm-cache-dir
        shell: bash
        run: echo "dir=$(npm config get cache)" >> ${GITHUB_OUTPUT}
      - uses: actions/cache@v4
        with:
          path: ${{ steps.npm-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Install
        run: npm ci
      - name: Make
        run: npm run make -- --arch=${{ matrix.arch }}
        shell: bash
        env:
          IS_CODESIGNING_ENABLED: "false"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clippy-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            out/**/*.zip
            out/**/*.deb
            out/**/*.rpm
            out/**/*setup*.exe

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten artifacts
        shell: bash
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name "*.zip" -o -name "*.deb" -o -name "*.rpm" -o -name "*setup*.exe" \) -exec cp {} release-files/ \;
          ls -la release-files/
      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Clippy (Latest Build)
          body: |
            Latest build of Clippy with cloud API support (OpenAI, Claude, Gemini).

            **Downloads:**
            - **macOS (Apple Silicon):** `Clippy-darwin-arm64-*.zip`
            - **macOS (Intel):** `Clippy-darwin-x64-*.zip`
            - **Windows:** `Clippy-win32-x64-*.zip` or `*setup*.exe`
            - **Linux:** `.deb` or `.rpm`
          draft: false
          prerelease: false
          make_latest: true
          files: release-files/*
